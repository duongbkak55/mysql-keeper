---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterswitchpolicies.mysql.keeper.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: mysql.keeper.io
  names:
    kind: ClusterSwitchPolicy
    listKind: ClusterSwitchPolicyList
    plural: clusterswitchpolicies
    singular: clusterswitchpolicy
    shortNames:
      - csp
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Role
          type: string
          jsonPath: .spec.clusterRole
        - name: Active
          type: string
          jsonPath: .status.activeCluster
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: ClusterSwitchPolicy configures DC-DR MySQL automatic switchover.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - clusterRole
                - pxcNamespace
                - pxcName
                - localMySQL
                - remoteMySQL
                - proxySQL
                - healthCheck
                - switchover
              properties:
                clusterRole:
                  type: string
                  enum: ["dc", "dr"]
                  description: "Whether this controller manages the 'dc' or 'dr' cluster."
                pxcNamespace:
                  type: string
                  description: "Namespace of the local PerconaXtraDBCluster resource."
                pxcName:
                  type: string
                  description: "Name of the local PerconaXtraDBCluster resource."
                autoFailover:
                  type: boolean
                  default: true
                  description: "Enable automatic failover when local cluster is unhealthy."
                manualSwitchoverTarget:
                  type: string
                  enum: ["", "promote-remote"]
                  description: "Set to 'promote-remote' to trigger a planned switchover."
                localMySQL:
                  type: object
                  description: "MySQL endpoint for the local PXC cluster."
                  required: ["host", "credentialsSecretRef"]
                  properties:
                    host:
                      type: string
                    port:
                      type: integer
                      default: 3306
                    credentialsSecretRef:
                      type: object
                      required: ["name"]
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                remoteMySQL:
                  type: object
                  description: "MySQL endpoint for the remote cluster (cross-cluster reachable)."
                  required: ["host", "credentialsSecretRef"]
                  properties:
                    host:
                      type: string
                    port:
                      type: integer
                      default: 3306
                    credentialsSecretRef:
                      type: object
                      required: ["name"]
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                proxySQL:
                  type: array
                  description: "Local ProxySQL admin endpoints."
                  items:
                    type: object
                    required: ["host", "credentialsSecretRef"]
                    properties:
                      host:
                        type: string
                      adminPort:
                        type: integer
                        default: 6032
                      credentialsSecretRef:
                        type: object
                        required: ["name"]
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                healthCheck:
                  type: object
                  properties:
                    interval:
                      type: string
                      default: "15s"
                    failureThreshold:
                      type: integer
                      default: 3
                    mysqlCheckTimeout:
                      type: string
                      default: "5s"
                    proxySQLMinHealthy:
                      type: integer
                      default: 2
                switchover:
                  type: object
                  required: ["remoteWriterHost", "localWriterHost"]
                  properties:
                    timeout:
                      type: string
                      default: "5m"
                    drainTimeout:
                      type: string
                      default: "30s"
                    fenceTimeout:
                      type: string
                      default: "10s"
                    readWriteHostgroup:
                      type: integer
                      default: 10
                    readOnlyHostgroup:
                      type: integer
                      default: 20
                    remoteWriterHost:
                      type: string
                    remoteWriterPort:
                      type: integer
                      default: 3306
                    localWriterHost:
                      type: string
            status:
              type: object
              properties:
                activeCluster:
                  type: string
                  enum: ["dc", "dr"]
                phase:
                  type: string
                consecutiveLocalFailures:
                  type: integer
                consecutiveRemoteFailures:
                  type: integer
                lastSwitchoverTime:
                  type: string
                  format: date-time
                lastSwitchoverReason:
                  type: string
                localHealth:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                remoteHealth:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                observedGeneration:
                  type: integer
