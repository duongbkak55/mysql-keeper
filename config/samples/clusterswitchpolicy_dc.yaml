---
# ClusterSwitchPolicy for the DC (primary) cluster.
# Deploy this CR in the DC Kubernetes cluster.
apiVersion: mysql.keeper.io/v1alpha1
kind: ClusterSwitchPolicy
metadata:
  name: dc-dr-policy
spec:
  # This controller manages the DC cluster.
  clusterRole: dc

  # Local PXC cluster (deployed by Percona XtraDB Operator in the DC cluster).
  pxcNamespace: percona-xtradb
  pxcName: pxc-dc

  # Channel that terminates on THIS cluster when this cluster is a replica.
  # For the DC CR this is the channel DC will run after a flip (when DC is
  # demoted to replica of DR). In a symmetric setup leave peerReplicationChannelName
  # unset and both sides use the same name.
  replicationChannelName: dc-to-dr

  # Optional — set only when DC→DR and DR→DC use different channel names.
  # peerReplicationChannelName is the channel on the PEER cluster (here DR)
  # when peer is acting as replica (pre-flip baseline). Preflight C3 and
  # post-promote STOP+RESET target this channel.
  # Example asymmetric setup:
  #   replicationChannelName:     dr-to-dc     # DC's inbound channel
  #   peerReplicationChannelName: dc-to-dr     # DR's inbound channel
  # peerReplicationChannelName: ""

  # MySQL endpoint for the LOCAL DC PXC cluster.
  # The controller reads health status and toggles read_only via this endpoint.
  localMySQL:
    host: pxc-dc-haproxy.percona-xtradb.svc.cluster.local
    port: 3306
    credentialsSecretRef:
      name: pxc-dc-admin-creds
      namespace: mysql-keeper-system

  # MySQL endpoint for the REMOTE DR PXC cluster.
  # This must be a VIP/LoadBalancer IP reachable from the DC network via MySQL port 3306.
  # The controller uses this to monitor DR health and to promote DR during failover.
  remoteMySQL:
    host: 10.20.0.100         # DR cluster's external MySQL endpoint (adjust to your network)
    port: 3306
    credentialsSecretRef:
      name: pxc-dr-admin-creds
      namespace: mysql-keeper-system

  # ProxySQL admin endpoints — choose ONE of the two options below.

  # Option A: dynamic discovery (recommended for Deployment-based ProxySQL).
  # The controller lists pods matching the label selector at every reconcile,
  # so endpoints are always current after pod restarts or IP changes.
  proxySQLSelector:
    namespace: percona-xtradb
    matchLabels:
      app: proxysql
      site: dc
    adminPort: 6032
    credentialsSecretRef:
      name: proxysql-dc-admin-creds
      namespace: mysql-keeper-system

  # Option B: static list (for StatefulSet-based ProxySQL with stable DNS names).
  # proxySQL:
  #   - host: proxysql-0.proxysql-dc.percona-xtradb.svc.cluster.local
  #     adminPort: 6032
  #     credentialsSecretRef:
  #       name: proxysql-dc-admin-creds
  #       namespace: mysql-keeper-system
  #   - host: proxysql-1.proxysql-dc.percona-xtradb.svc.cluster.local
  #     adminPort: 6032
  #     credentialsSecretRef:
  #       name: proxysql-dc-admin-creds
  #       namespace: mysql-keeper-system
  #   - host: proxysql-2.proxysql-dc.percona-xtradb.svc.cluster.local
  #     adminPort: 6032
  #     credentialsSecretRef:
  #       name: proxysql-dc-admin-creds
  #       namespace: mysql-keeper-system

  healthCheck:
    interval: 15s              # Run health checks every 15 seconds.
    failureThreshold: 3        # Declare unhealthy after 3 consecutive failures (~45s).
    mysqlCheckTimeout: 5s      # Per-query MySQL timeout.
    proxySQLMinHealthy: 2      # At least 2 of 3 ProxySQL must be reachable.

  switchover:
    timeout: 5m                # Abort and roll back if switchover exceeds 5 minutes.
    drainTimeout: 30s          # Wait 30s for connections to drain before fencing.
    fenceTimeout: 10s          # Max time to attempt fencing (set read_only=ON) on local cluster.
    cooldownPeriod: 10m        # Minimum interval between consecutive switchovers.
    resumeStuckTimeout: 10m    # Abandon a switchover whose progress has not advanced in this long.
    blackholeHostgroup: 9999   # ProxySQL HG used by the alternate fence path (unrouted).
    readWriteHostgroup: 10     # ProxySQL HG 10 = write traffic.
    readOnlyHostgroup: 20      # ProxySQL HG 20 = read traffic.
    # After failover, writes route to the DR cluster via its external MySQL IP.
    remoteWriterHost: 10.20.0.100   # DR MySQL external endpoint (same as remoteMySQL.host).
    remoteWriterPort: 3306
    # The local DC writer entry to demote in ProxySQL.
    localWriterHost: pxc-dc-haproxy.percona-xtradb.svc.cluster.local

  # PreFlight gates the switchover on GTID completeness and replication health.
  # These defaults are production-safe; override only after reading
  # docs/runbooks/dr-drill.md.
  preFlight:
    catchupTimeout: 30s                  # How long to wait for the replica to catch up.
    minBinlogRetentionSeconds: 604800    # 7 days — C11 soft check.

  # AllowDataLossFailover lets the controller promote DR even when the
  # preflight GTID subset check cannot run (DC is destroyed). Leave false
  # unless the business has explicitly accepted the data-loss risk.
  allowDataLossFailover: false

  # MANO API config (recommended). When set, isSource changes on both local and remote
  # PXC clusters are applied via the MANO LCM API, which then reconciles the CRD.
  # This prevents the PXC operator from fighting our state change on its next reconcile.
  mano:
    host: https://mano.example.com
    credentialsSecretRef:
      name: mano-credentials
      namespace: mysql-keeper-system
    localCnfName: pxc-dc-cnf        # CNF name of the DC PXC cluster in MANO
    localVduName: pxc-dc-vdu        # VDU name of the DC PXC cluster in MANO
    remoteCnfName: pxc-dr-cnf       # CNF name of the DR PXC cluster in MANO
    remoteVduName: pxc-dr-vdu       # VDU name of the DR PXC cluster in MANO
    pollInterval: 5s                 # how often to poll lcm-op-occ
    pollTimeout: 5m                  # max wait for COMPLETED

  # Optional: direct remote k8s API (fallback if MANO is not available).
  # remoteKubeAPI:
  #   host: https://10.20.0.10:6443
  #   tokenSecretRef: { name: dr-kube-token, namespace: mysql-keeper-system }
  #   pxcNamespace: percona-xtradb
  #   pxcName: pxc-dr

  # Enable automatic failover. Set to false for manual-only operation.
  autoFailover: true

  # Replication error handling — alarm on SQL apply errors / GTID gaps,
  # optionally auto-skip rows that match a conservative whitelist.
  # See docs/replication-error-handling.md for the full design.
  replicationErrorHandling:
    # 0 disables the GTID-gap alarm. Positive values fire a Warning event +
    # condition once gtid_missing_transactions exceeds the threshold.
    gtidGapAlertThreshold: 0
    autoSkip:
      enabled: true
      # Dry-run logs "WouldSkipTransaction" without running SQL. Flip to true
      # on a freshly-deployed cluster while you validate the configuration.
      dryRun: false
      # 1062 = duplicate key, 1032 = row not found on update/delete.
      # Schema-drift errors (1146 table missing, 1054 column missing) are
      # intentionally absent — they require operator review, not silent skip.
      errorCodeWhitelist: [1062, 1032]
      maxSkipsPerWindow: 3
      window: 10m
      # When skip count in QuarantineWindow strictly exceeds this threshold,
      # the replica is quarantined and PreFlight C12 blocks any promote
      # until the operator clears it via annotation.
      maxSkipBeforeQuarantine: 5
      quarantineWindow: 1h
